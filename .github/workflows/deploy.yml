name: Deploy Frontend via Docker

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: my-blog-web
      CONTAINER_NAME: my-blog

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .

    - name: Save Docker image
      run: |
        docker save $IMAGE_NAME:${{ github.sha }} -o image.tar
        chmod 644 image.tar

    - name: Prepare remote deploy directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        port: ${{ secrets.ALIYUN_PORT }}
        script: |
          mkdir -p /tmp/deploy-${{ github.sha }}

    - name: Transfer Docker image
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        port: ${{ secrets.ALIYUN_PORT }}
        timeout: 60s
        debug: true
        source: "image.tar"
        target: "/tmp/deploy-${{ github.sha }}"

    - name: Load image and deploy container
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        port: ${{ secrets.ALIYUN_PORT }}
        timeout: 60s
        script_stop: true
        debug: true
        script: |
          set -e
          echo "=== Starting container deployment ==="
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          DEPLOY_DIR=/tmp/deploy-${{ github.sha }}
          
          echo "Changing directory to $DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          
          echo "Loading Docker image..."
          sudo docker load -i image.tar
          echo "Image loaded successfully."
          
          echo "Checking for existing container: $CONTAINER_NAME"
          old_container=$(sudo docker ps -aq --filter "name=$CONTAINER_NAME")
          if [ -n "$old_container" ]; then
            echo "Removing existing container: $old_container"
            sudo docker rm -f "$old_container"
            echo "Existing container removed."
          else
            echo "No existing container found."
          fi
          
          echo "Starting new container..."
          if ! sudo docker run -d --name "$CONTAINER_NAME" -p 80:80 --restart unless-stopped "$IMAGE_NAME:${{ github.sha }}"; then
            echo "🚨 docker run failed"
            echo "== container status =="
            sudo docker ps -a --filter "name=$CONTAINER_NAME"
            echo "== container logs =="
            sudo docker logs "$CONTAINER_NAME" || true
            exit 1
          fi
          echo "✅ New container started successfully."
          
          echo "== finished docker run =="
          sudo docker ps --filter "name=$CONTAINER_NAME"
          
          echo "Cleaning up deploy directory: $DEPLOY_DIR"
          rm -rf "$DEPLOY_DIR"
          echo "=== Deployment script completed ==="

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        port: ${{ secrets.ALIYUN_PORT }}
        timeout: 30s
        debug: true
        script: |
